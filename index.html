<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meemaw Store — Catálogo 3D</title>
  <meta name="description" content="Catálogo de peças impressas em 3D: chaveiros, fidgets, organização e muito mais." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div>
      <div class="logo">Meemaw<span>Store</span></div>
      <div class="header-sub">Presentes e Utilidades personalizados para você.</div>
    </div>
    <div class="busca-wrapper">
      <input type="search" id="busca" placeholder="Buscar peça..." autocomplete="off" />
    </div>
  </header>

  <main>
    <p class="filtros-label">Filtrar por</p>
    <div id="filtros"></div>
    <div id="catalogo"></div>
  </main>

  <footer>
    Feito com 🧡 pela Meemaw Store &mdash; Todas as peças são impressas sob encomenda.
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
